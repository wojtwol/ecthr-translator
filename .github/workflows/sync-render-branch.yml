name: Sync Render branch with main

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to Render branch
        run: git push origin main:claude/fix-translation-download-OMtCe --force
